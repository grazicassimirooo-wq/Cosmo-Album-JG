# Deploy automático do Álbum J&G no Firebase (Hosting + Functions + regras).
#
# ⚠️ Precisa de UM segredo configurado no GitHub (qualquer um dos dois):
#
# Caminho A — FIREBASE_TOKEN (recomendado; funciona mesmo quando o Google
# bloqueia a criação de chaves de conta de serviço):
#   1. Abra o Cloud Shell no navegador: https://shell.cloud.google.com
#   2. Rode:  npx --yes firebase-tools@13 login:ci --no-localhost
#      Abra o link que aparecer, entre com a MESMA conta Google do Firebase,
#      autorize e cole de volta o código. O comando imprime um token (começa
#      com "1//").
#   3. GitHub → Settings → Secrets and variables → Actions → New repository secret
#      Nome:  FIREBASE_TOKEN   ·   Valor: o token inteiro
#
# Caminho B — FIREBASE_SERVICE_ACCOUNT (se a sua conta permitir gerar chave):
#   1. Console do Firebase → Configurações do projeto → Contas de serviço
#      → "Gerar nova chave privada" (baixa um arquivo .json)
#   2. Segredo com nome FIREBASE_SERVICE_ACCOUNT e o conteúdo inteiro do .json
#
# Sem segredo nenhum, o job apenas avisa e termina verde (o GitHub Pages
# continua publicando o site normalmente a cada merge). Com um dos segredos,
# todo push/merge na main publica o site no Firebase Hosting E as Cloud
# Functions de push (notificações de foto/carta/doce) + regras do
# Firestore/Storage. Também dá pra disparar manualmente na aba Actions
# ("Run workflow").
name: Deploy Firebase

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Avisar quando nenhum segredo existe
        if: env.FIREBASE_SERVICE_ACCOUNT == '' && env.FIREBASE_TOKEN == ''
        run: |
          echo "::notice title=Deploy do Firebase pulado::Nenhum segredo configurado (FIREBASE_TOKEN ou FIREBASE_SERVICE_ACCOUNT — instruções no topo de .github/workflows/deploy.yml). O site continua publicando pelo GitHub Pages."

      # ── Caminho A: token do Firebase CLI (deploy completo de uma vez) ──
      - name: Deploy completo com FIREBASE_TOKEN
        if: env.FIREBASE_TOKEN != '' && env.FIREBASE_SERVICE_ACCOUNT == ''
        run: |
          npm --prefix functions install --no-fund --no-audit
          npx --yes firebase-tools@13 deploy \
            --only hosting,functions,firestore:rules \
            --project album--jussara --non-interactive --force
          # As regras do Storage só entram depois de ativar o Storage no console
          # (https://console.firebase.google.com/project/album--jussara/storage
          # → "Get Started"). Até lá, a falha aqui não derruba o deploy.
          npx --yes firebase-tools@13 deploy \
            --only storage \
            --project album--jussara --non-interactive --force \
          || echo "::notice title=Storage pulado::Firebase Storage ainda não foi ativado no console — as regras do Storage não foram publicadas (o resto do deploy foi)."

      - name: Diagnóstico (região do banco e estado das funções)
        if: env.FIREBASE_TOKEN != '' && env.FIREBASE_SERVICE_ACCOUNT == ''
        run: |
          echo "── bancos Firestore ──"
          npx --yes firebase-tools@13 firestore:databases:get "(default)" --project album--jussara --json \
            || npx --yes firebase-tools@latest firestore:databases:get "(default)" --project album--jussara --json \
            || npx --yes firebase-tools@13 firestore:databases:list --project album--jussara || true
          echo "── funções ──"
          npx --yes firebase-tools@13 functions:list --project album--jussara || true

      # ── Caminho B: chave de conta de serviço ──
      - name: Deploy Hosting
        if: env.FIREBASE_SERVICE_ACCOUNT != ''
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: album--jussara

      - name: Deploy Functions + regras (Firestore e Storage)
        if: env.FIREBASE_SERVICE_ACCOUNT != ''
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa.json"
          npm --prefix functions install --no-fund --no-audit
          npx --yes firebase-tools@latest deploy \
            --only functions,firestore:rules,storage \
            --project album--jussara --non-interactive --force

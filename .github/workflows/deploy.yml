# Deploy automático do Álbum J&G no Firebase (Hosting + Functions + regras).
#
# ⚠️ Precisa de UM segredo configurado no GitHub para funcionar:
#   1. Console do Firebase → Configurações do projeto → Contas de serviço
#      → "Gerar nova chave privada" (baixa um arquivo .json)
#   2. GitHub → Settings → Secrets and variables → Actions → New repository secret
#      Nome:  FIREBASE_SERVICE_ACCOUNT
#      Valor: o conteúdo inteiro do arquivo .json
#
# Sem o segredo, o job apenas avisa e termina verde (o GitHub Pages continua
# publicando o site normalmente a cada merge). Com o segredo, todo push/merge
# na main publica o site no Firebase Hosting E as Cloud Functions de push
# (notificações de foto/carta/doce) + regras do Firestore/Storage.
# Também dá pra disparar manualmente na aba Actions ("Run workflow").
name: Deploy Firebase

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
    steps:
      - uses: actions/checkout@v4

      - name: Avisar quando o segredo não existe
        if: env.FIREBASE_SERVICE_ACCOUNT == ''
        run: |
          echo "::notice title=Deploy do Firebase pulado::O segredo FIREBASE_SERVICE_ACCOUNT ainda não foi configurado (instruções no topo de .github/workflows/deploy.yml). O site continua publicando pelo GitHub Pages."

      - name: Deploy Hosting
        if: env.FIREBASE_SERVICE_ACCOUNT != ''
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: album--jussara

      - name: Deploy Functions + regras (Firestore e Storage)
        if: env.FIREBASE_SERVICE_ACCOUNT != ''
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa.json"
          npm --prefix functions install --no-fund --no-audit
          npx --yes firebase-tools@latest deploy \
            --only functions,firestore:rules,storage \
            --project album--jussara --non-interactive --force

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>✒️ Escrever Carta de Amor — J&G</title>
<meta name="theme-color" content="#0E0B36">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800&family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600;1,700&family=Great+Vibes&family=Pinyon+Script&family=Tangerine:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --indigo:#0E0B36;
  --indigo2:#1A1450;
  --indigo3:#221766;
  --parchment:#F1E0BD;
  --parchment2:#E8D29C;
  --parchment3:#D9BE83;
  --ink:#3A2410;
  --ink2:#5A3820;
  --gold:#C9A24A;
  --gold2:#E8C36A;
  --gold-glow:#F4DA8A;
  --gold-deep:#8E6A1F;
  --wine:#5C1A22;
  --wine2:#7A2530;
  --rose:#C7424B;
  --rose-lt:#E36870;
  --leaf:#2F5A2A;
  --leaf2:#4A7A38;
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%}
body{
  font-family:'Cormorant Garamond',serif;
  color:var(--parchment);
  background:#06041C;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
  min-height:100vh;
}

/* ═══════════════════════════════════════════════════
   COSMIC NIGHT BACKGROUND
   ═══════════════════════════════════════════════════ */
.sky{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 40% at 12% 14%, rgba(232,184,109,.18), transparent 60%),
    radial-gradient(ellipse 50% 35% at 85% 78%, rgba(199,66,75,.18), transparent 60%),
    radial-gradient(ellipse 70% 50% at 70% 30%, rgba(124,91,173,.22), transparent 60%),
    radial-gradient(ellipse 100% 80% at 50% 50%, var(--indigo3) 0%, var(--indigo2) 40%, var(--indigo) 70%, #06041C 100%);
}
.sky::before,.sky::after{
  content:'';position:absolute;inset:0;
  background-image:
    radial-gradient(1.4px 1.4px at 6% 10%, #fff 50%, transparent 100%),
    radial-gradient(1px 1px at 18% 22%, rgba(244,218,138,.85) 50%, transparent 100%),
    radial-gradient(1.6px 1.6px at 32% 8%, #fff 50%, transparent 100%),
    radial-gradient(1px 1px at 44% 18%, rgba(255,255,255,.7) 50%, transparent 100%),
    radial-gradient(1.4px 1.4px at 58% 28%, var(--gold-glow) 50%, transparent 100%),
    radial-gradient(1px 1px at 72% 12%, rgba(255,255,255,.85) 50%, transparent 100%),
    radial-gradient(1.8px 1.8px at 86% 26%, #fff 50%, transparent 100%),
    radial-gradient(1px 1px at 94% 8%, rgba(255,255,255,.7) 50%, transparent 100%),
    radial-gradient(1.2px 1.2px at 8% 46%, rgba(244,218,138,.75) 50%, transparent 100%),
    radial-gradient(1.4px 1.4px at 24% 62%, #fff 50%, transparent 100%),
    radial-gradient(1px 1px at 40% 78%, rgba(255,255,255,.7) 50%, transparent 100%),
    radial-gradient(1.6px 1.6px at 56% 88%, var(--gold-glow) 50%, transparent 100%),
    radial-gradient(1px 1px at 74% 70%, rgba(255,255,255,.6) 50%, transparent 100%),
    radial-gradient(1.4px 1.4px at 88% 84%, #fff 50%, transparent 100%);
  background-repeat:no-repeat;background-size:100% 100%;
  animation:twk 5s ease-in-out infinite alternate;
}
.sky::after{
  background-image:
    radial-gradient(1px 1px at 14% 30%, rgba(255,255,255,.6) 50%, transparent 100%),
    radial-gradient(1.4px 1.4px at 30% 44%, var(--gold-glow) 50%, transparent 100%),
    radial-gradient(1px 1px at 50% 56%, rgba(255,255,255,.55) 50%, transparent 100%),
    radial-gradient(1.4px 1.4px at 72% 50%, #fff 50%, transparent 100%),
    radial-gradient(1px 1px at 88% 60%, rgba(244,218,138,.7) 50%, transparent 100%);
  animation:twk 7s ease-in-out infinite alternate-reverse;
}
@keyframes twk{0%{opacity:.4}100%{opacity:1}}

/* planetas/luas decorativas no fundo */
.planet{
  position:fixed;border-radius:50%;z-index:0;pointer-events:none;
  filter:blur(.4px);
  opacity:.6;
}
.planet.moon{
  top:11%;left:14%;width:34px;height:34px;
  background:radial-gradient(circle at 35% 35%,#F8E6B0,#C49A3E 70%,#7A5A20);
  box-shadow:0 0 30px rgba(244,210,122,.25);
}
.planet.mars{
  top:46%;left:6%;width:26px;height:26px;
  background:radial-gradient(circle at 35% 35%,#E08055,#8B3520 70%,#4A1810);
  box-shadow:0 0 24px rgba(199,66,75,.25);
  opacity:.5;
}
.planet.lune{
  top:34%;right:7%;width:42px;height:42px;
  background:radial-gradient(circle at 70% 30%,#F0E0A8,#9A7838 75%,#3A2810);
  box-shadow:0 0 32px rgba(244,210,122,.18);
  opacity:.45;
}

/* constelações finas no fundo */
.const{
  position:fixed;z-index:0;pointer-events:none;opacity:.35;
  font-family:serif;color:var(--gold-glow);
}
.const.c1{top:60%;left:5%;font-size:.6rem;letter-spacing:6px}
.const.c2{top:22%;right:6%;font-size:.5rem;letter-spacing:5px}
.const.c3{bottom:18%;right:10%;font-size:.55rem;letter-spacing:6px}

/* ═══════════════════════════════════════════════════
   APP CONTAINER
   ═══════════════════════════════════════════════════ */
.app{
  position:relative;z-index:2;
  max-width:440px;margin:0 auto;
  padding:0;
  min-height:100vh;
  display:flex;flex-direction:column;
}

/* ═══════════════════════════════════════════════════
   ORNATE OUTER FRAME (gold + scroll corners)
   ═══════════════════════════════════════════════════ */
.frame{
  position:relative;
  margin:8px;
  padding:46px 14px 0;
  border:2px solid var(--gold);
  border-radius:4px;
  background:
    linear-gradient(180deg,rgba(14,11,54,.4),rgba(14,11,54,.1)),
    radial-gradient(ellipse at 50% 0%,rgba(232,195,106,.06),transparent 50%);
  box-shadow:
    inset 0 0 0 1px rgba(244,218,138,.25),
    inset 0 0 24px rgba(232,195,106,.08),
    0 0 30px rgba(0,0,0,.5);
}
.frame::before{
  content:'';position:absolute;inset:5px;
  border:1px solid rgba(244,218,138,.4);border-radius:2px;
  pointer-events:none;
}

/* topo: arco com lua + folhagens */
.arch{
  position:absolute;top:-2px;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:10px;
  background:var(--indigo);
  padding:0 18px;color:var(--gold2);
  font-size:1.1rem;
  z-index:5;
  text-shadow:0 0 12px rgba(244,218,138,.6);
}
.arch::before,.arch::after{
  content:'❦';font-size:.85rem;color:var(--gold);opacity:.85;
}

/* cantos com flores */
.cornerflower{
  position:absolute;width:130px;height:130px;
  z-index:3;pointer-events:none;
  filter:drop-shadow(0 4px 10px rgba(0,0,0,.5));
}
.cornerflower.tl{top:-10px;left:-10px}
.cornerflower.tr{top:-10px;right:-10px;transform:scaleX(-1)}
.cornerflower.bl{bottom:-10px;left:-10px;transform:scaleY(-1)}
.cornerflower.br{bottom:-10px;right:-10px;transform:scale(-1,-1)}

/* leaves */
.leaf{
  position:absolute;width:60px;height:24px;
  background:radial-gradient(ellipse at 30% 50%, var(--leaf2) 0%, var(--leaf) 60%, #1c3a18 100%);
  border-radius:60% 10% 60% 10%;
  box-shadow:inset 0 -2px 4px rgba(0,0,0,.4),inset 0 2px 4px rgba(255,255,255,.08);
}
.leaf.l1{top:18px;left:8px;transform:rotate(-25deg)}
.leaf.l2{top:48px;left:-4px;transform:rotate(20deg);width:50px;height:20px}
.leaf.l3{top:78px;left:14px;transform:rotate(-50deg);width:46px;height:18px}
.leaf.l4{top:8px;left:42px;transform:rotate(45deg);width:44px;height:18px}

/* flor (rosa) construída com camadas radiais */
.rose{
  position:absolute;border-radius:50%;
  background:
    radial-gradient(circle at 50% 50%,#5C0E14 0%,#8E1A22 18%,#C7424B 38%,#E36870 60%,#F2A0A4 100%);
  box-shadow:
    inset 0 -8px 14px rgba(60,5,12,.7),
    inset 0 6px 12px rgba(255,180,170,.35),
    0 4px 14px rgba(0,0,0,.45);
}
.rose::before{
  content:'';position:absolute;inset:18%;border-radius:50%;
  background:radial-gradient(circle at 40% 35%,#F8B0A8,#C7424B 50%,#5C0E14 100%);
  box-shadow:inset 0 -4px 8px rgba(60,5,12,.6);
}
.rose::after{
  content:'';position:absolute;inset:38%;border-radius:50%;
  background:radial-gradient(circle at 45% 40%,#FACFC6,#A02530 90%);
}
.rose.r1{top:0;left:18px;width:54px;height:54px}
.rose.r2{top:36px;left:46px;width:42px;height:42px;background:radial-gradient(circle at 50% 50%,#5C0E14 0%,#8E1A22 18%,#D85A2F 38%,#F0945A 65%,#F8C58A 100%)}
.rose.r3{top:56px;left:8px;width:34px;height:34px}
.rose.r4{top:-6px;left:62px;width:30px;height:30px;background:radial-gradient(circle at 50% 50%,#5C0E14 0%,#8E1A22 20%,#E78A2C 45%,#F4B868 70%,#FCDFA0 100%)}
.rose.r5{top:78px;left:54px;width:26px;height:26px;background:radial-gradient(circle at 50% 50%,#5C0E14 0%,#8E1A22 20%,#E78A2C 45%,#F4B868 70%,#FCDFA0 100%)}

/* tiny bud */
.bud{
  position:absolute;width:14px;height:14px;border-radius:50%;
  background:radial-gradient(circle at 40% 35%,#F2A0A4,#8E1A22);
  box-shadow:0 2px 6px rgba(0,0,0,.4);
}
.bud.b1{top:96px;left:38px}
.bud.b2{top:6px;left:96px}

/* ═══════════════════════════════════════════════════
   PAGE TITLE BANNER (top of frame)
   ═══════════════════════════════════════════════════ */
.title-banner{
  position:relative;z-index:4;
  text-align:center;padding:0 12px 18px;
}
.title-banner h1{
  font-family:'Great Vibes',cursive;
  font-size:2.3rem;font-weight:400;line-height:1;
  background:linear-gradient(180deg,#FCE6A8 0%,var(--gold2) 50%,var(--gold-deep) 100%);
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:0 2px 12px rgba(244,218,138,.25);
  padding:0 28px;
  letter-spacing:.5px;
}
.title-orn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  margin-top:4px;color:var(--gold);opacity:.75;font-size:.7rem;
}
.title-orn::before,.title-orn::after{
  content:'';height:1px;width:40px;
  background:linear-gradient(90deg,transparent,var(--gold));
}
.title-orn::after{background:linear-gradient(90deg,var(--gold),transparent)}

/* ═══════════════════════════════════════════════════
   PARCHMENT SCROLL
   ═══════════════════════════════════════════════════ */
.scroll-wrap{
  position:relative;z-index:3;
  margin:0 4px 18px;
  padding:24px 22px 100px;
  background:
    radial-gradient(ellipse at 20% 18%, rgba(0,0,0,.04), transparent 50%),
    radial-gradient(ellipse at 80% 82%, rgba(90,56,32,.08), transparent 55%),
    radial-gradient(ellipse at 50% 50%, var(--parchment) 0%, var(--parchment2) 65%, var(--parchment3) 100%);
  color:var(--ink);
  /* deckled edges */
  -webkit-mask:
    radial-gradient(circle at 4px 8px,transparent 3px,#000 4px) top left/12px 12px repeat-x,
    radial-gradient(circle at 4px 4px,transparent 3px,#000 4px) bottom left/12px 12px repeat-x,
    radial-gradient(circle at 8px 4px,transparent 3px,#000 4px) top left/12px 12px repeat-y,
    radial-gradient(circle at 4px 4px,transparent 3px,#000 4px) top right/12px 12px repeat-y,
    linear-gradient(#000,#000);
          mask:
    radial-gradient(circle at 4px 8px,transparent 3px,#000 4px) top left/12px 12px repeat-x,
    radial-gradient(circle at 4px 4px,transparent 3px,#000 4px) bottom left/12px 12px repeat-x,
    radial-gradient(circle at 8px 4px,transparent 3px,#000 4px) top left/12px 12px repeat-y,
    radial-gradient(circle at 4px 4px,transparent 3px,#000 4px) top right/12px 12px repeat-y,
    linear-gradient(#000,#000);
  -webkit-mask-composite:source-over;mask-composite:add;
  box-shadow:
    0 14px 40px rgba(0,0,0,.55),
    0 0 0 1px rgba(180,140,80,.25) inset;
}

/* paper texture: spots + fibres */
.scroll-wrap::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background-image:
    radial-gradient(circle at 22% 14%, rgba(120,80,30,.10) 0, transparent 3px),
    radial-gradient(circle at 70% 8%, rgba(120,80,30,.07) 0, transparent 4px),
    radial-gradient(circle at 88% 22%, rgba(120,80,30,.10) 0, transparent 3px),
    radial-gradient(circle at 14% 38%, rgba(120,80,30,.06) 0, transparent 5px),
    radial-gradient(circle at 52% 44%, rgba(120,80,30,.07) 0, transparent 3px),
    radial-gradient(circle at 78% 62%, rgba(120,80,30,.10) 0, transparent 4px),
    radial-gradient(circle at 30% 76%, rgba(120,80,30,.08) 0, transparent 3px),
    radial-gradient(circle at 60% 86%, rgba(120,80,30,.10) 0, transparent 4px);
  opacity:.55;
}

/* inner gold floral filigree (CSS-only suggestion) */
.scroll-wrap::after{
  content:'';position:absolute;inset:10px;
  border:1px solid rgba(180,140,80,.18);
  border-radius:2px;
  pointer-events:none;
  background:
    radial-gradient(circle at 0% 0%,rgba(200,150,60,.12),transparent 18%),
    radial-gradient(circle at 100% 0%,rgba(200,150,60,.12),transparent 18%),
    radial-gradient(circle at 0% 100%,rgba(200,150,60,.12),transparent 18%),
    radial-gradient(circle at 100% 100%,rgba(200,150,60,.12),transparent 18%);
}

/* canto floral interno (no pergaminho) */
.inner-floral{
  position:absolute;width:90px;height:90px;
  pointer-events:none;opacity:.55;
  background:
    radial-gradient(circle at 30% 30%,rgba(200,150,60,.5) 0,transparent 8%),
    radial-gradient(circle at 50% 22%,rgba(200,150,60,.45) 0,transparent 9%),
    radial-gradient(circle at 22% 52%,rgba(200,150,60,.45) 0,transparent 9%),
    radial-gradient(circle at 60% 60%,rgba(200,150,60,.35) 0,transparent 11%),
    radial-gradient(circle at 78% 38%,rgba(200,150,60,.4) 0,transparent 7%);
  filter:blur(.4px);
}
.inner-floral.tl{top:14px;left:14px}
.inner-floral.br{bottom:14px;right:14px;transform:scale(-1)}

/* scroll inner title */
.scroll-title{
  font-family:'Great Vibes',cursive;
  font-size:1.7rem;line-height:1;text-align:center;
  color:var(--ink);
  background:linear-gradient(180deg,#6A3A14,#3A2410);
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-bottom:6px;
}
.scroll-orn{
  display:flex;align-items:center;justify-content:center;gap:6px;
  margin-bottom:18px;color:var(--gold-deep);font-size:.7rem;opacity:.7;
}
.scroll-orn::before,.scroll-orn::after{
  content:'';height:1px;width:50px;
  background:linear-gradient(90deg,transparent,var(--gold-deep));
}
.scroll-orn::after{background:linear-gradient(90deg,var(--gold-deep),transparent)}

/* pena dourada no canto superior direito */
.quill{
  position:absolute;top:22px;right:18px;
  font-size:2rem;
  color:var(--gold2);
  filter:drop-shadow(0 3px 6px rgba(0,0,0,.3));
  transform:rotate(28deg);
  animation:writing 3.2s ease-in-out infinite;
  pointer-events:none;
}
@keyframes writing{
  0%,100%{transform:rotate(28deg) translateY(0)}
  50%{transform:rotate(22deg) translateY(-3px)}
}

/* área de escrita */
.letter-field{
  position:relative;z-index:2;
}
.letter-greet{
  font-family:'Pinyon Script',cursive;
  font-size:1.5rem;color:var(--ink2);
  margin-bottom:4px;
  display:flex;align-items:baseline;gap:6px;
}
.letter-greet input{
  background:transparent;border:none;outline:none;
  font:inherit;color:var(--ink2);
  border-bottom:1.5px solid rgba(90,56,32,.45);
  padding:0 4px 1px;flex:1;min-width:0;
  font-family:'Pinyon Script',cursive;
}
.letter-greet input::placeholder{color:rgba(90,56,32,.4)}

.letter-body{
  width:100%;min-height:220px;
  background:transparent;border:none;outline:none;resize:none;
  font-family:'Cormorant Garamond',serif;
  font-style:italic;
  font-size:1.05rem;
  line-height:1.7;
  color:var(--ink);
  padding:14px 0 0;
  letter-spacing:.2px;
}
.letter-body::placeholder{color:rgba(58,36,16,.35);font-style:italic}

/* assinatura suave em baixo */
.letter-sign{
  position:absolute;bottom:80px;right:24px;
  font-family:'Tangerine',cursive;font-weight:700;
  font-size:1.9rem;color:var(--ink);opacity:.5;
  transform:rotate(-4deg);
  pointer-events:none;
}

/* ═══════════════════════════════════════════════════
   RIBBON BUTTONS (Salvar / Enviar)
   ═══════════════════════════════════════════════════ */
.ribbons{
  position:absolute;bottom:18px;left:0;right:0;
  display:flex;justify-content:center;gap:14px;
  z-index:5;padding:0 12px;
}
.ribbon{
  position:relative;
  flex:1;max-width:160px;
  height:46px;
  background:linear-gradient(180deg,#7A2530 0%,#5C1A22 50%,#3E0E16 100%);
  display:flex;align-items:center;justify-content:center;gap:10px;
  padding:0 20px 0 36px;
  font-family:'Cinzel',serif;
  font-size:.92rem;font-weight:600;letter-spacing:1.5px;
  color:#F4DA8A;
  text-shadow:0 1px 2px rgba(0,0,0,.6);
  border:1.5px solid var(--gold);
  cursor:pointer;
  box-shadow:
    inset 0 1px 0 rgba(244,218,138,.35),
    inset 0 -8px 16px rgba(0,0,0,.4),
    0 4px 12px rgba(0,0,0,.5);
  clip-path:polygon(8% 0,100% 0,92% 50%,100% 100%,8% 100%,0 50%);
  transition:transform .2s,filter .2s;
}
.ribbon:hover{filter:brightness(1.12)}
.ribbon:active{transform:translateY(2px) scale(.97)}

/* selo dourado/medalha à esquerda */
.ribbon .seal{
  position:absolute;left:-2px;top:50%;transform:translate(-30%,-50%);
  width:42px;height:42px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#FCE6A8 0%,var(--gold2) 40%,var(--gold) 65%,var(--gold-deep) 100%);
  border:2px solid var(--gold-deep);
  display:flex;align-items:center;justify-content:center;
  font-size:1.05rem;color:#5C3A10;
  box-shadow:
    inset 0 -3px 6px rgba(90,55,15,.55),
    inset 0 2px 4px rgba(255,235,180,.6),
    0 3px 8px rgba(0,0,0,.5);
  z-index:2;
}

/* ═══════════════════════════════════════════════════
   BOTTOM NAV
   ═══════════════════════════════════════════════════ */
.bnav{
  position:relative;z-index:3;
  margin:0 8px 8px;
  padding:14px 8px 10px;
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:6px;
  background:
    linear-gradient(180deg,rgba(14,11,54,.7),rgba(14,11,54,.95)),
    radial-gradient(ellipse at 50% 100%,rgba(232,195,106,.08),transparent 60%);
  border-top:2px solid var(--gold);
  border-left:2px solid var(--gold);
  border-right:2px solid var(--gold);
  border-radius:4px 4px 0 0;
  box-shadow:inset 0 0 0 1px rgba(244,218,138,.25);
}
.bn{
  background:transparent;border:none;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  padding:6px 4px;
  color:var(--gold2);
  font-family:'Cinzel',serif;
  font-size:.62rem;font-weight:600;letter-spacing:1.2px;
  text-transform:none;
  opacity:.85;transition:all .25s;
}
.bn:hover{opacity:1;transform:translateY(-2px)}
.bn .ico{
  width:34px;height:34px;line-height:1;
  filter:drop-shadow(0 0 8px rgba(244,218,138,.35));
  display:flex;align-items:center;justify-content:center;
}
.bn .ico svg{width:100%;height:100%;display:block}
.bn .ico .gold-stroke{stroke:url(#gold-grad);fill:none;stroke-width:1.4;stroke-linecap:round;stroke-linejoin:round}
.bn .ico .gold-fill{fill:url(#gold-grad)}
.bn .ico .gold-fill-soft{fill:url(#gold-grad);opacity:.35}
.bn.active{opacity:1;color:var(--gold-glow)}
.bn.active .ico{
  filter:drop-shadow(0 0 14px rgba(244,218,138,.75));
  transform:translateY(-1px);
}
.bn.active::after{
  content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);
  width:14px;height:2px;border-radius:99px;
  background:linear-gradient(90deg,transparent,var(--gold-glow),transparent);
  box-shadow:0 0 8px rgba(244,218,138,.6);
}
.bn{position:relative}
.bn .lbl{font-size:.72rem;font-family:'Cormorant Garamond',serif;font-style:italic;letter-spacing:1.2px;margin-top:2px}

/* banner final dourado */
.bot-banner{
  position:relative;z-index:3;
  margin:0 8px 8px;
  padding:10px 14px;
  background:linear-gradient(180deg,var(--wine2) 0%,var(--wine) 60%,#3E0E16 100%);
  border:2px solid var(--gold);
  border-radius:4px;
  text-align:center;
  font-family:'Cinzel',serif;
  font-size:.78rem;font-weight:700;letter-spacing:2.2px;
  color:var(--gold-glow);
  text-shadow:0 1px 2px rgba(0,0,0,.7);
  box-shadow:inset 0 0 0 1px rgba(244,218,138,.3),0 4px 14px rgba(0,0,0,.5);
  display:flex;align-items:center;justify-content:center;gap:10px;
}
.bot-banner::before,.bot-banner::after{
  content:'❦';color:var(--gold2);opacity:.7;font-size:.85rem;
}

}
</style>
</head>
<body>

<!-- noite cósmica -->
<div class="sky"></div>
<div class="planet moon"></div>
<div class="planet mars"></div>
<div class="planet lune"></div>
<span class="const c1">✦ · · ✧ · · ✦</span>
<span class="const c2">✧ · ✦ · ✧</span>
<span class="const c3">· ✦ · · ✧ ·</span>

<div class="app">

  <!-- moldura ornamentada -->
  <div class="frame">

    <!-- arco no topo com luas -->
    <div class="arch">☾ <span style="font-family:'Great Vibes',cursive;font-size:.9rem">memória &amp; amor</span> ☽</div>

    <!-- flores nos 4 cantos -->

      <span class="leaf l1"></span><span class="leaf l2"></span>
      <span class="leaf l3"></span><span class="leaf l4"></span>

      <span class="rose r5"></span>
      <span class="bud b1"></span><span class="bud b2"></span>
    </div>
    <div class="cornerflower tr">
      <span class="leaf l1"></span><span class="leaf l2"></span>
      <span class="leaf l3"></span><span class="leaf l4"></span>
      <span class="rose r1"></span><span class="rose r2"></span>
      <span class="rose r3"></span><span class="rose r4"></span>
      <span class="rose r5"></span>
      <span class="bud b1"></span><span class="bud b2"></span>
    </div>
    <div class="cornerflower bl">
      <span class="leaf l1"></span><span class="leaf l2"></span>
      <span class="leaf l3"></span><span class="leaf l4"></span>
      <span class="rose r1"></span><span class="rose r2"></span>
      <span class="rose r3"></span><span class="rose r4"></span>
      <span class="rose r5"></span>
      <span class="bud b1"></span><span class="bud b2"></span>
    </div>
    <div class="cornerflower br">
      <span class="leaf l1"></span><span class="leaf l2"></span>
      <span class="leaf l3"></span><span class="leaf l4"></span>
      <span class="rose r1"></span><span class="rose r2"></span>
      <span class="rose r3"></span><span class="rose r4"></span>
      <span class="rose r5"></span>
      <span class="bud b1"></span><span class="bud b2"></span>
    </div>

    <!-- título da página -->
    <div class="title-banner">
      <h1>Escrever Carta de Amor</h1>
      <div class="title-orn">☾ ❦ ☽</div>
    </div>

    <!-- pergaminho -->
    <div class="scroll-wrap">
      <span class="inner-floral tl"></span>
      <span class="inner-floral br"></span>

      <!-- pena dourada -->
      <span class="quill">🪶</span>

      <div class="scroll-title">Escrever Carta de Amor</div>
      <div class="scroll-orn">❦</div>

      <form class="letter-field" onsubmit="event.preventDefault();enviar()">
        <label class="letter-greet">
          <span>Querida</span>
          <input id="dest" type="text" placeholder="Jussara" value="Jussara">
          <span>,</span>
        </label>

        <textarea id="letter" class="letter-body" placeholder="Cada estrela do céu sabe o teu nome. Hoje escrevo do silêncio do universo só para te dizer que…"></textarea>

        <span class="letter-sign">com amor, G ✦</span>

        <!-- botões fita -->
        <div class="ribbons">
          <button type="button" class="ribbon" onclick="salvar()">
            <span class="seal">✒</span>
            <span>Salvar</span>
          </button>
          <button type="submit" class="ribbon">
            <span class="seal">✈</span>
            <span>Enviar</span>
          </button>
        </div>
      </form>
    </div>

  </div>

  <!-- defs SVG (gradiente dourado compartilhado) -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <linearGradient id="gold-grad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%"  stop-color="#FCE6A8"/>
        <stop offset="45%" stop-color="#E8C36A"/>
        <stop offset="100%" stop-color="#8E6A1F"/>
      </linearGradient>
    </defs>
  </svg>

  <!-- bottom nav dourada -->
  <nav class="bnav">

    <!-- ☾ Início — lua-crescente com estrela -->
    <button class="bn" onclick="location.href='index.html'" aria-label="Início">
      <span class="ico">
        <svg viewBox="0 0 32 32">
          <!-- crescente -->
          <path class="gold-fill" d="M22 6.4c-6.2 1-10.8 6.4-10.8 12.8 0 5.1 2.9 9.5 7.2 11.6-7.5 .4-13.9-5.5-13.9-13.3C4.5 9.9 11 3.6 18.8 4c1.1 .06 2.2 .25 3.2 .5z"/>
          <!-- estrelinha companhia -->
          <path class="gold-fill" d="M25.6 10.5 l1 -3 1 3 3 1 -3 1 -1 3 -1 -3 -3 -1z"/>
          <!-- ponto -->
          <circle class="gold-fill-soft" cx="26.5" cy="20" r="0.9"/>
        </svg>
      </span>
      <span class="lbl">Início</span>
    </button>

    <!-- 📖 Memórias — livro aberto com coração -->
    <button class="bn" onclick="location.href='memory-gallery.html'" aria-label="Memórias">
      <span class="ico">
        <svg viewBox="0 0 32 32">
          <!-- páginas (curvas) -->
          <path class="gold-stroke" d="M4 8 C 9 7, 13.5 8, 16 11 C 18.5 8, 23 7, 28 8 L 28 25 C 23 24, 18.5 25, 16 27.5 C 13.5 25, 9 24, 4 25 Z"/>
          <!-- lombada central -->
          <path class="gold-stroke" d="M16 11 V 27.5"/>
          <!-- linhas de texto -->
          <path class="gold-stroke" style="opacity:.6" d="M7 13 L 13 13.5 M7 16 L 13 16 M7 19 L 13 19"/>
          <path class="gold-stroke" style="opacity:.6" d="M19 13.5 L 25 13 M19 16 L 25 16 M19 19 L 25 19"/>
          <!-- coração no centro -->
          <path class="gold-fill" d="M16 21.5 c -1.1 -1.2 -2.6 -1.6 -3.5 -.7 -1.1 1.1 -.4 2.7 .8 3.7 .9 .7 1.7 1.3 2.7 2.3 1 -1 1.8 -1.6 2.7 -2.3 1.2 -1 1.9 -2.6 .8 -3.7 -.9 -.9 -2.4 -.5 -3.5 .7z"/>
        </svg>
      </span>
      <span class="lbl">Memórias</span>
    </button>

    <!-- ✦ Explorar — rosa-dos-ventos -->
    <button class="bn" aria-label="Explorar">
      <span class="ico">
        <svg viewBox="0 0 32 32">
          <!-- círculo externo -->
          <circle class="gold-stroke" cx="16" cy="16" r="13" style="opacity:.55"/>
          <circle class="gold-stroke" cx="16" cy="16" r="10.4" style="opacity:.3"/>
          <!-- 4 pontas grandes -->
          <path class="gold-fill" d="M16 2.5 L 18 14 L 16 16 L 14 14 Z"/>
          <path class="gold-fill" d="M16 29.5 L 18 18 L 16 16 L 14 18 Z"/>
          <path class="gold-fill" d="M2.5 16 L 14 14 L 16 16 L 14 18 Z"/>
          <path class="gold-fill" d="M29.5 16 L 18 14 L 16 16 L 18 18 Z"/>
          <!-- 4 pontas pequenas (diagonais) -->
          <path class="gold-fill-soft" d="M6 6 L 14.5 14.5 L 14 16 Z"/>
          <path class="gold-fill-soft" d="M26 6 L 17.5 14.5 L 18 16 Z"/>
          <path class="gold-fill-soft" d="M6 26 L 14.5 17.5 L 16 18 Z"/>
          <path class="gold-fill-soft" d="M26 26 L 17.5 17.5 L 16 18 Z"/>
          <!-- centro -->
          <circle class="gold-fill" cx="16" cy="16" r="1.6"/>
        </svg>
      </span>
      <span class="lbl">Explorar</span>
    </button>

    <!-- ☙ Perfil — camafeu (silhueta + moldura oval) -->
    <button class="bn active" aria-label="Perfil">
      <span class="ico">
        <svg viewBox="0 0 32 32">
          <!-- moldura oval ornamentada (dupla) -->
          <ellipse class="gold-stroke" cx="16" cy="16" rx="11.5" ry="13.2"/>
          <ellipse class="gold-stroke" cx="16" cy="16" rx="9.8" ry="11.4" style="opacity:.55"/>
          <!-- pétalas/flores nos quatro pólos da moldura -->
          <circle class="gold-fill" cx="16" cy="2.5" r="1.4"/>
          <circle class="gold-fill" cx="16" cy="29.5" r="1.4"/>
          <circle class="gold-fill" cx="3.5" cy="16" r="1.2"/>
          <circle class="gold-fill" cx="28.5" cy="16" r="1.2"/>
          <!-- folhinhas laterais -->
          <path class="gold-fill-soft" d="M4 12 q 1.5 -1.5 3 0 q -1.5 1.5 -3 0z"/>
          <path class="gold-fill-soft" d="M4 20 q 1.5 -1.5 3 0 q -1.5 1.5 -3 0z"/>
          <path class="gold-fill-soft" d="M28 12 q -1.5 -1.5 -3 0 q 1.5 1.5 3 0z"/>
          <path class="gold-fill-soft" d="M28 20 q -1.5 -1.5 -3 0 q 1.5 1.5 3 0z"/>
          <!-- silhueta da dama: cabeça + coque + ombro -->
          <path class="gold-fill"
                d="M16 9.2
                   a 2.6 2.8 0 1 1 0 .01
                   M 13.2 16.4
                   c -1.4 1.6 -2.2 3.6 -2.4 5.8
                   l 10.4 0
                   c -.2 -2.2 -1 -4.2 -2.4 -5.8
                   c -1.5 -1.6 -4.1 -1.6 -5.6 0 z
                   M 17.6 8.6
                   q 2 -.8 2.4 -2.6
                   q -2.4 .4 -3 1.8 z"/>
        </svg>
      </span>
      <span class="lbl">Perfil</span>
    </button>

  </nav>

  <!-- faixa final -->
  <div class="bot-banner">COLECIONE MEMÓRIAS, GUARDE SENTIMENTOS</div>

</div>

<script>
  const key = 'jg-letter-draft';

  // restaurar rascunho
  try {
    const draft = JSON.parse(localStorage.getItem(key) || 'null');
    if (draft) {
      if (draft.dest) document.getElementById('dest').value = draft.dest;
      if (draft.body) document.getElementById('letter').value = draft.body;
    }
  } catch (e) {}

  // auto-save
  ['dest','letter'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
      localStorage.setItem(key, JSON.stringify({
        dest: document.getElementById('dest').value,
        body: document.getElementById('letter').value,
        ts: Date.now()
      }));
    });
  });

  function salvar(){
    const body = document.getElementById('letter').value.trim();
    if (!body) {
      flash('Escreva algo antes de selar a carta ✦');
      return;
    }
    localStorage.setItem(key + '-saved-' + Date.now(), document.getElementById('letter').value);
    if (navigator.vibrate) navigator.vibrate([20, 60, 20]);
    flash('Carta selada e guardada ✒');
  }

  function enviar(){
    const body = document.getElementById('letter').value.trim();
    const dest = document.getElementById('dest').value.trim() || 'meu amor';
    if (!body) { flash('A carta está em branco…'); return; }
    if (navigator.vibrate) navigator.vibrate([10, 40, 10, 40, 80]);
    flash('Enviada ao céu para ' + dest + ' ✈');
    setTimeout(() => {
      document.getElementById('letter').value = '';
      localStorage.removeItem(key);
    }, 1200);
  }

  function flash(msg){
    let f = document.createElement('div');
    f.textContent = msg;
    Object.assign(f.style, {
      position:'fixed',top:'24px',left:'50%',transform:'translateX(-50%) translateY(-20px)',
      background:'linear-gradient(180deg,#7A2530,#3E0E16)',
      color:'#F4DA8A',
      fontFamily:"'Cinzel',serif",fontSize:'.78rem',letterSpacing:'1.5px',fontWeight:'600',
      padding:'10px 22px',borderRadius:'4px',
      border:'1.5px solid #C9A24A',
      boxShadow:'0 8px 24px rgba(0,0,0,.5),inset 0 1px 0 rgba(244,218,138,.35)',
      zIndex:'100',opacity:'0',transition:'all .4s'
    });
    document.body.appendChild(f);
    requestAnimationFrame(() => {
      f.style.opacity = '1'; f.style.transform = 'translateX(-50%) translateY(0)';
    });
    setTimeout(() => {
      f.style.opacity = '0'; f.style.transform = 'translateX(-50%) translateY(-20px)';
      setTimeout(() => f.remove(), 400);
    }, 2200);
  }
</script>

</body>

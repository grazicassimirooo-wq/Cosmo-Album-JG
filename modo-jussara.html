<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Modo Jussara · o que ela vem vendo · J&amp;G</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Playfair+Display:ital,wght@0,600;0,700;0,800;0,900;1,700&family=Dancing+Script:wght@600;700&family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600&display=swap" rel="stylesheet">
<style>
:root{
  --night:#12102E;--night2:#0A0820;--night3:#06041C;
  --cream:#F0DFC0;--cream2:#E8D5B7;--cream3:#D4C4A0;
  --coral:#D4736E;--coral-lt:#E89890;
  --mauve:#8B6B95;--mauve-lt:#B396BE;--mauve-deep:#5E4668;
  --gold:#C4956A;--gold2:#E8B86D;--gold3:#F4DCA8;--gold-deep:#8E6A1F;
  --ink:#2A2540;--ink2:#3A2410;
  --space:clamp(22px,6vw,30px);
  --ease-out:cubic-bezier(.2,.7,.2,1);
  --ease-spring:cubic-bezier(.34,1.56,.64,1);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:'Nunito',sans-serif;background:var(--night3);color:var(--cream);
  -webkit-font-smoothing:antialiased;line-height:1.5;min-height:100vh;overflow-x:hidden}
.board{max-width:468px;margin:0 auto;position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column}
:focus-visible{outline:2px solid var(--gold2);outline-offset:3px;border-radius:6px}

/* atmosfera */
.sky-bg{position:fixed;inset:-10% -5%;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 45% at 20% 8%,rgba(196,149,106,.20),transparent 60%),
    radial-gradient(ellipse 55% 35% at 85% 88%,rgba(139,107,149,.14),transparent 60%),
    linear-gradient(180deg,var(--night),var(--night2) 55%,var(--night3))}
.sky-stars{position:fixed;inset:-10%;z-index:0;pointer-events:none;opacity:.6;
  background-image:
    radial-gradient(1px 1px at 12% 18%,rgba(255,255,255,.5) 50%,transparent),
    radial-gradient(1.2px 1.2px at 72% 26%,rgba(232,184,109,.55) 50%,transparent),
    radial-gradient(1px 1px at 28% 64%,rgba(179,150,190,.5) 50%,transparent),
    radial-gradient(1.2px 1.2px at 86% 50%,#fff 50%,transparent);
  background-repeat:no-repeat}

.dt-aurora{position:fixed;inset:-15% -10%;z-index:0;pointer-events:none;opacity:0;filter:blur(60px);will-change:transform,opacity}
.dt-aurora-a{background:radial-gradient(ellipse 45% 55% at 10% 28%,rgba(196,149,106,.28),transparent 65%)}
.dt-aurora-b{background:radial-gradient(ellipse 42% 55% at 92% 22%,rgba(139,107,149,.22),transparent 65%)}
@media (min-width:900px){
  .dt-aurora-a{opacity:.55;animation:dtA 26s var(--ease-out) infinite alternate}
  .dt-aurora-b{opacity:.55;animation:dtB 32s var(--ease-out) infinite alternate}
}
@keyframes dtA{0%{transform:translate3d(-2%,0,0) scale(1)}100%{transform:translate3d(3%,-2%,0) scale(1.08)}}
@keyframes dtB{0%{transform:translate3d(2%,1%,0) scale(1.04)}100%{transform:translate3d(-2%,-1%,0) scale(1)}}

/* topbar */
.chap-topbar{position:relative;z-index:3;display:flex;align-items:center;justify-content:space-between;padding:14px var(--space) 6px}
.cb-back{background:none;border:none;cursor:pointer;text-decoration:none;font-family:'Nunito',sans-serif;font-weight:800;font-size:.6rem;letter-spacing:2px;text-transform:uppercase;color:var(--cream3);display:flex;align-items:center;gap:6px;padding:6px 4px;transition:color .2s}
.cb-back:hover,.cb-back:focus-visible{color:var(--gold2)}
.cb-who{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.7rem;letter-spacing:2px;color:var(--gold2);opacity:.75}

/* header */
.head{padding:26px var(--space) 12px;text-align:left}
.kicker{font-family:'Nunito';font-weight:800;font-size:.6rem;letter-spacing:3px;text-transform:uppercase;color:var(--gold2)}
.head h1{font-family:'Playfair Display',serif;font-weight:900;font-size:clamp(2.2rem,10vw,2.8rem);line-height:1;margin:8px 0 6px;letter-spacing:-.5px}
.head .sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1rem;color:var(--cream2);line-height:1.5;max-width:360px}
.folio{font-family:'Cormorant Garamond',serif;font-size:.62rem;letter-spacing:3px;text-transform:uppercase;color:var(--cream3);opacity:.55;margin-top:14px}

.hair{height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.55;margin:6px var(--space)}

/* seções */
.card{margin:16px var(--space);padding:20px 20px 22px;
  background:linear-gradient(180deg,#181535,#12102f);
  border:1px solid rgba(232,184,109,.24);border-radius:14px}
.card .label{font-family:'Nunito';font-weight:900;font-size:.56rem;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold2);margin-bottom:6px}
.card h3{font-family:'Playfair Display',serif;font-weight:800;font-size:1.3rem;line-height:1.1;margin-bottom:4px}
.card .deck{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.9rem;color:var(--cream3);margin-bottom:14px;line-height:1.45}
.card .state{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.95rem;color:var(--cream);line-height:1.5}
.card .state b{font-family:'Nunito';font-weight:800;font-style:normal;color:var(--gold2)}
.card .state.empty{color:var(--cream3);opacity:.75}
.card .aside{margin-top:10px;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.78rem;color:var(--cream3);opacity:.72;line-height:1.45}

/* pote */
.pote-hero{display:flex;align-items:center;gap:14px;padding:8px 0 2px}
.pote-mini{width:52px;height:60px;border-radius:6px 6px 12px 12px;flex-shrink:0;
  background:linear-gradient(180deg,rgba(232,184,109,.35),rgba(139,107,149,.25) 55%,rgba(124,91,173,.35));
  border:1.5px solid rgba(232,184,109,.5);position:relative;overflow:hidden}
.pote-mini::before{content:'';position:absolute;top:0;left:12%;right:12%;height:12px;
  background:linear-gradient(180deg,#8E6A1F,#5A4210);border-radius:5px 5px 2px 2px}
.pote-mini::after{content:'';position:absolute;bottom:6px;left:14%;width:36%;height:6px;
  background:linear-gradient(180deg,#F0DFC0,#D4C4A0);border-radius:2px;transform:rotate(-8deg)}
.pote-info .dia-num{font-family:'Playfair Display',serif;font-weight:900;font-size:1.8rem;line-height:1;color:var(--gold2);margin-right:6px}
.pote-info .dia-lbl{font-family:'Nunito';font-weight:700;font-size:.55rem;letter-spacing:2px;text-transform:uppercase;color:var(--cream3);display:block;margin-top:4px}

/* fidelidade — grid mini */
.fid-mini{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-top:4px}
.fid-dot{aspect-ratio:1/1;border-radius:6px;
  background:rgba(255,255,255,.04);border:1px dashed rgba(232,184,109,.28);
  display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;font-weight:900;font-size:.65rem;color:var(--cream3);opacity:.55}
.fid-dot.on{opacity:1;background:linear-gradient(160deg,var(--gold2),var(--gold));border:1.5px solid var(--gold-deep);color:var(--ink)}
.fid-summary{margin-top:12px;display:flex;align-items:center;gap:10px}
.fid-summary .n{font-family:'Playfair Display',serif;font-weight:900;font-size:2rem;line-height:1;color:var(--gold2)}
.fid-summary .lbl{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.85rem;color:var(--cream2);line-height:1.4}
.fid-bar{height:4px;background:rgba(232,184,109,.15);border-radius:99px;overflow:hidden;margin-top:8px}
.fid-bar-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2),var(--gold3));border-radius:99px;transition:width .8s var(--ease-out);width:0}

/* secreto */
.secreto-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:99px;
  background:rgba(212,115,110,.14);border:1px solid rgba(179,150,190,.4);
  font-family:'Nunito';font-weight:800;font-size:.55rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--mauve-lt)}

/* bilhetes do pote — histórico */
.bt-tabs{display:flex;gap:8px;margin-bottom:12px}
.bt-tab{flex:1;padding:8px 12px;border-radius:99px;cursor:pointer;
  background:rgba(232,184,109,.06);border:1px solid rgba(232,184,109,.2);color:var(--cream2);
  font-family:'Nunito';font-weight:800;font-size:.55rem;letter-spacing:1.5px;text-transform:uppercase;
  transition:background .2s,border-color .2s,color .2s;text-align:center;display:flex;align-items:center;justify-content:center;gap:6px}
.bt-tab.on{background:rgba(232,184,109,.18);border-color:rgba(232,184,109,.55);color:var(--gold3)}
.bt-count{padding:1px 7px;border-radius:99px;background:rgba(232,184,109,.24);color:var(--gold3);font-size:.55rem;font-weight:900}
.bt-list{display:flex;flex-direction:column;gap:8px;max-height:360px;overflow-y:auto;padding:2px 2px 4px}
.bt-item{padding:11px 13px;border-radius:8px;position:relative;
  background:linear-gradient(160deg,#F4DCA8 0%,#E8B86D 55%,#C4956A 100%);color:#2E1A08;
  border:1px solid rgba(90,60,20,.4);
  box-shadow:0 4px 10px rgba(0,0,0,.35);
  -webkit-mask:radial-gradient(circle 3px at 3px 50%,transparent 2.6px,#000 3px) left/6px 100% no-repeat,
    radial-gradient(circle 3px at calc(100% - 3px) 50%,transparent 2.6px,#000 3px) right/6px 100% no-repeat,
    linear-gradient(#000,#000) 6px 0/calc(100% - 12px) 100% no-repeat;
  mask:radial-gradient(circle 3px at 3px 50%,transparent 2.6px,#000 3px) left/6px 100% no-repeat,
    radial-gradient(circle 3px at calc(100% - 3px) 50%,transparent 2.6px,#000 3px) right/6px 100% no-repeat,
    linear-gradient(#000,#000) 6px 0/calc(100% - 12px) 100% no-repeat}
.bt-item .bt-txt{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1rem;line-height:1.35;color:#2E1A08}
.bt-item .bt-meta{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:8px;
  font-family:'Nunito';font-weight:800;font-size:.5rem;letter-spacing:1.3px;text-transform:uppercase;color:rgba(46,26,8,.7)}
.bt-item .bt-lido{padding:2px 8px;border-radius:99px;background:rgba(90,60,20,.14);border:1px solid rgba(90,60,20,.3);color:rgba(46,26,8,.75)}
.bt-item .bt-lido.on{background:rgba(46,26,8,.75);color:#F4DCA8;border-color:rgba(46,26,8,.9)}
.bt-empty{text-align:center;padding:14px;font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--cream3);opacity:.6}

/* timeline */
.tl-list{display:flex;flex-direction:column;gap:8px;margin-top:6px}
.tl-item{display:grid;grid-template-columns:28px 1fr auto;gap:12px;align-items:center;
  padding:10px 12px;border-radius:10px;
  background:rgba(232,184,109,.05);border:1px solid rgba(232,184,109,.14)}
.tl-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle at 35% 30%,var(--gold3),var(--gold) 65%,var(--gold-deep));
  color:var(--ink);font-size:.85rem;line-height:1;filter:drop-shadow(0 3px 6px rgba(0,0,0,.35))}
.tl-icon.pote     {background:radial-gradient(circle at 35% 30%,var(--gold3),var(--gold) 65%,var(--gold-deep))}
.tl-icon.fid      {background:radial-gradient(circle at 35% 30%,#F4DCA8,#C4956A 65%,#8E6A1F)}
.tl-icon.sec      {background:radial-gradient(circle at 35% 30%,#E89890,#7A1F26 70%);color:#F4E3D5}
.tl-icon.cap      {background:radial-gradient(circle at 35% 30%,var(--mauve-lt),var(--mauve) 65%,var(--mauve-deep));color:var(--cream)}
.tl-text{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.85rem;color:var(--cream);line-height:1.3}
.tl-text b{font-family:'Nunito';font-style:normal;font-weight:800;color:var(--gold2);font-size:.62rem;letter-spacing:1.2px;text-transform:uppercase;display:block;margin-bottom:1px}
.tl-when{font-family:'Nunito';font-weight:700;font-size:.55rem;letter-spacing:1.2px;text-transform:uppercase;color:var(--cream3);opacity:.7;white-space:nowrap}
.tl-streak{margin-top:12px;padding:8px 12px;border-radius:99px;
  background:linear-gradient(90deg,rgba(255,140,80,.14),rgba(232,184,109,.14));
  border:1px solid rgba(232,140,80,.3);
  font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.86rem;color:var(--gold3);
  display:inline-flex;align-items:center;gap:8px}
.tl-streak.on b{font-family:'Nunito';font-style:normal;font-weight:900;color:#FFB08A}
.tl-empty{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.9rem;color:var(--cream3);opacity:.7;text-align:center;padding:14px 0}

/* rodapé */
.foot{padding:22px var(--space) 38px;text-align:center}
.foot .privacy{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.78rem;color:var(--cream3);opacity:.65;line-height:1.5;max-width:340px;margin:0 auto}

/* gate wrong user */
.wrong{padding:36px var(--space);text-align:center}
.wrong h2{font-family:'Playfair Display',serif;font-weight:900;font-size:1.6rem;color:var(--cream);margin-bottom:12px}
.wrong p{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1rem;color:var(--cream2);margin-bottom:20px;max-width:340px;margin-left:auto;margin-right:auto;line-height:1.5}
.wrong a{display:inline-block;padding:11px 22px;border-radius:99px;text-decoration:none;
  background:linear-gradient(180deg,var(--gold3),var(--gold) 60%,var(--gold-deep));color:var(--ink);
  font-family:'Nunito';font-weight:900;font-size:.7rem;letter-spacing:1.5px;text-transform:uppercase;
  box-shadow:0 6px 18px rgba(196,149,106,.4)}

@media (prefers-reduced-motion:reduce){.dt-aurora{animation:none!important}}

/* login gate */
.cosmo-login-gate{position:fixed;inset:0;z-index:99999;display:none;align-items:center;justify-content:center;padding:24px;
  background:radial-gradient(ellipse at 50% 20%,rgba(124,91,173,.15),transparent 55%),linear-gradient(170deg,#100E28,#181440,#12102A);}
.cosmo-login-gate.show{display:flex}
.clg-card{max-width:340px;width:100%;text-align:center;font-family:'Nunito',sans-serif}
.clg-deco{font-size:1rem;color:#C4956A;opacity:.6;letter-spacing:4px;margin-bottom:10px}
.clg-card h2{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:800;color:#F0DFC0;margin-bottom:6px}
.clg-card p{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.95rem;color:rgba(240,223,192,.6);margin-bottom:26px}
.clg-options{display:flex;flex-direction:column;gap:14px}
.clg-opt{display:flex;align-items:center;gap:14px;padding:16px 20px;border-radius:16px;
  background:rgba(240,223,192,.04);border:1px solid rgba(240,223,192,.12);
  color:#F0DFC0;font-family:'Nunito',sans-serif;font-weight:800;font-size:1rem;letter-spacing:.5px;cursor:pointer;transition:.2s;text-align:left}
.clg-opt:active{background:rgba(240,223,192,.1);transform:scale(.98)}
.clg-ico{font-size:1.6rem}
</style>
</head>
<body>
<div class="cosmo-login-gate" id="cosmoLoginGate" aria-hidden="true">
  <div class="clg-card">
    <div class="clg-deco">✦ ✧ ✦</div>
    <h2>Quem é você?</h2>
    <p>Escolha seu perfil pra personalizar o álbum</p>
    <div class="clg-options">
      <button type="button" class="clg-opt" data-user="jussara"><span class="clg-ico">🌼</span><span>Jussara</span></button>
      <button type="button" class="clg-opt" data-user="grazi"><span class="clg-ico">🌻</span><span>Grazi</span></button>
    </div>
  </div>
</div>
<script>
(function(){
  var u=null; try{ u = localStorage.getItem('cosmoUser'); }catch(e){}
  if(u){ try{ localStorage.setItem('cosmoLastUser', u); }catch(e){} return; }
  document.addEventListener('DOMContentLoaded', function(){
    var gate = document.getElementById('cosmoLoginGate');
    if(!gate) return;
    gate.classList.add('show');
    gate.querySelectorAll('.clg-opt').forEach(function(b){
      b.addEventListener('click', function(){
        try{
          localStorage.setItem('cosmoUser', b.dataset.user);
          localStorage.setItem('cosmoLastUser', b.dataset.user);
        }catch(e){}
        location.reload();
      });
    });
  });
})();
</script>

<div class="sky-bg"></div>
<div class="sky-stars"></div>
<div class="dt-aurora dt-aurora-a"></div>
<div class="dt-aurora dt-aurora-b"></div>

<div class="board" id="board">
  <!-- topbar -->
  <div class="chap-topbar">
    <a class="cb-back" href="index.html#sumario" aria-label="Voltar ao sumário">← <span>sumário</span></a>
    <span class="cb-who">para a Jussara ✦</span>
  </div>

  <!-- container que muda conforme identidade -->
  <div id="content"></div>
</div>

<!-- Firebase read-only -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
(function(){
  const who = (function(){ try{ return localStorage.getItem('cosmoUser'); }catch(e){ return null; } })();
  const other = who === 'jussara' ? 'grazi' : who === 'grazi' ? 'jussara' : null;

  // gate: só a Jussara vê o Modo Jussara
  if(who !== 'jussara'){
    document.getElementById('content').innerHTML =
      '<div class="wrong">'
      +'<h2>Este espaço é da Jussara ✦</h2>'
      +'<p>O <em>Modo Jussara</em> é um cantinho pra ela ver, sem intromissão, o que a Grazi vem visitando. Volta pro sumário e continua folheando o álbum ♡</p>'
      +'<a href="index.html#sumario">← voltar ao sumário</a>'
      +'</div>';
    return;
  }

  // render skeleton
  document.getElementById('content').innerHTML =
    '<header class="head">'
     +'<div class="kicker">✦ Modo Jussara</div>'
     +'<h1>O que a Grazi<br>vem vendo</h1>'
     +'<p class="sub">um cantinho tranquilo pra você acompanhar o que ela abre — sem push, sem barulho, só carinho.</p>'
     +'<div class="folio">JG · MODO JUSSARA · read-only</div>'
    +'</header>'
    +'<div class="hair"></div>'
    +'<section class="card" id="cardPote">'
      +'<div class="label">o pote de hoje</div>'
      +'<h3>Bilhete do dia</h3>'
      +'<p class="deck">se ela já abriu o pote hoje, aparece qual dia caiu.</p>'
      +'<div id="poteBody" class="state empty">ainda carregando…</div>'
      +'<div class="aside">o pote é diário — cicla no dia do mês. o bilhete de hoje some meia-noite pra dar lugar ao de amanhã.</div>'
    +'</section>'
    +'<section class="card" id="cardFid">'
      +'<div class="label">cartão fidelidade</div>'
      +'<h3>Os 12 selos da Grazi</h3>'
      +'<p class="deck">cada bolinha é um selo — dourada = ela raspou, cinza = ainda selado.</p>'
      +'<div class="fid-mini" id="fidMini"></div>'
      +'<div class="fid-summary"><span class="n" id="fidN">0</span><span class="lbl">de 12 selos resgatados</span></div>'
      +'<div class="fid-bar"><div class="fid-bar-fill" id="fidBar"></div></div>'
    +'</section>'
    +'<section class="card" id="cardSecreto">'
      +'<div class="label">o caderno secreto</div>'
      +'<h3>Ela abriu o VI?</h3>'
      +'<p class="deck">só marca visita — sem detalhe de dentro. o conteúdo é dos dois.</p>'
      +'<div id="secretoBody" class="state empty">ainda carregando…</div>'
    +'</section>'
    +'<section class="card" id="cardVisits">'
      +'<div class="label">os seis cadernos</div>'
      +'<h3>Onde ela andou</h3>'
      +'<p class="deck">quais dos cadernos a Grazi abriu — inclui o secreto.</p>'
      +'<div id="visitsBody" class="state empty">ainda carregando…</div>'
    +'</section>'
    +'<section class="card" id="cardBilhetes">'
      +'<div class="label">o pote — histórico</div>'
      +'<h3>Bilhetes que vocês trocaram</h3>'
      +'<p class="deck">o que você mandou pra ela e o que ela te mandou — em ordem cronológica.</p>'
      +'<div class="bt-tabs">'
        +'<button type="button" class="bt-tab on" data-bt="env">✒ enviados <span class="bt-count" id="btCountEnv">0</span></button>'
        +'<button type="button" class="bt-tab" data-bt="rec">💛 recebidos <span class="bt-count" id="btCountRec">0</span></button>'
      +'</div>'
      +'<div class="bt-list" id="btListEnv"></div>'
      +'<div class="bt-list" id="btListRec" style="display:none"></div>'
    +'</section>'
    +'<section class="card" id="cardTimeline">'
      +'<div class="label">últimas coisas</div>'
      +'<h3>Timeline</h3>'
      +'<p class="deck">os 15 últimos gestos dela — só o que, nunca o dentro.</p>'
      +'<div class="tl-list" id="tlList"><div class="tl-empty">montando o histórico…</div></div>'
      +'<div id="streakBox"></div>'
    +'</section>'
    +'<div class="foot"><p class="privacy">O que a Jussara escreve, sente e escolhe fica com ela. Este painel mostra só as visitas — nada do que está dentro dos cadernos.</p></div>';

  // firebase
  const FIREBASE_CONFIG = {
    apiKey: "AIzaSyD0-GBYHLsYc_mqqq3Ymhbq3ynpIdx2sMg",
    authDomain: "album--jussara.firebaseapp.com",
    projectId: "album--jussara",
    storageBucket: "album--jussara.firebasestorage.app",
    messagingSenderId: "732871382789",
    appId: "1:732871382789:web:7d93bce8c431ba80bd496c"
  };
  let _db = null;
  try{
    if(typeof firebase !== 'undefined'){
      if(!firebase.apps || !firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
      _db = firebase.firestore();
      try{ _db.settings({ experimentalAutoDetectLongPolling: true, merge: true }); }catch(e){}
    }
  }catch(e){ _db = null; }

  // pinta o grid de 12 pré-vazio
  const fidMini = document.getElementById('fidMini');
  for(let i=1; i<=12; i++){
    const dot = document.createElement('div');
    dot.className = 'fid-dot';
    dot.setAttribute('data-selo', String(i));
    dot.textContent = i;
    fidMini.appendChild(dot);
  }

  function todayYmd(){
    const d = new Date();
    return d.getFullYear() + '-' + (d.getMonth()+1) + '-' + d.getDate();
  }
  function relativo(ts){
    const dif = Date.now() - ts;
    const d = Math.floor(dif / 86400000);
    if(d === 0) return 'hoje';
    if(d === 1) return 'ontem';
    if(d < 7)   return 'há ' + d + ' dias';
    if(d < 30)  return 'há ' + Math.floor(d/7) + (Math.floor(d/7)===1?' semana':' semanas');
    return 'há ' + Math.floor(d/30) + (Math.floor(d/30)===1?' mês':' meses');
  }

  if(!_db){
    document.getElementById('poteBody').textContent    = 'sem conexão com o servidor no momento.';
    document.getElementById('secretoBody').textContent = 'sem conexão com o servidor no momento.';
    return;
  }

  // buffers pra timeline
  const buf = { pote: [], fid: [], sec: [], vis: [] };

  const CAP_NAMES = {
    '1':'Palavras de Afirmação', '2':'Tempo de Qualidade', '3':'Toque Físico',
    '4':'Atos de Serviço', '5':'Presentes', '6':'Caderno secreto'
  };

  function rebuildTimeline(){
    const all = []
      .concat(buf.pote.map(x => ({ts:x.ts, kind:'pote', text:'Pegou o bilhete de hoje do <b>pote</b>' + (x.dia?' (dia '+x.dia+')':'')})))
      .concat(buf.fid.map(x  => ({ts:x.ts, kind:'fid',  text:'Raspou o selo <b>#'+x.seloId+'</b> do cartão fidelidade'})))
      .concat(buf.sec.map(x  => ({ts:x.ts, kind:'sec',  text:'Abriu o <b>caderno secreto</b>'})))
      .concat(buf.vis.map(x  => ({ts:x.ts, kind:'cap',  text:'Abriu o <b>' + (CAP_NAMES[x.cap]||('Cap. '+x.cap)) + '</b>'})));
    all.sort((a,b)=> b.ts - a.ts);
    const top = all.slice(0, 15);
    const list = document.getElementById('tlList');
    if(!top.length){ list.innerHTML = '<div class="tl-empty">ainda sem histórico registrado ♡</div>'; return; }
    const ICONS = { pote:'✒', fid:'✦', sec:'♡', cap:'✧' };
    const LABELS = { pote:'pote', fid:'fidelidade', sec:'secreto', cap:'capítulo' };
    list.innerHTML = top.map(e => (
      '<div class="tl-item">'
        +'<span class="tl-icon '+e.kind+'" aria-hidden="true">'+ICONS[e.kind]+'</span>'
        +'<span class="tl-text"><b>'+LABELS[e.kind]+'</b>'+e.text+'</span>'
        +'<span class="tl-when">'+relativo(e.ts)+'</span>'
      +'</div>'
    )).join('');
  }

  function paintVisits(){
    const body = document.getElementById('visitsBody');
    const visited = new Set(buf.vis.map(x => x.cap));
    if(!visited.size){
      body.className = 'state empty';
      body.textContent = 'ela ainda não abriu nenhum caderno pelo Firestore ♡';
      return;
    }
    body.className = 'state';
    const capsOrder = ['1','2','3','4','5','6'];
    const list = capsOrder.map(c => (
      '<div style="display:flex;align-items:center;gap:8px;padding:5px 0;">'
        +'<span style="width:22px;height:22px;border-radius:50%;background:'+(visited.has(c)?'linear-gradient(135deg,#F4DCA8,#C4956A)':'rgba(232,184,109,.08)')+';color:'+(visited.has(c)?'#2A2540':'#D4C4A0')+';font-family:\'Playfair Display\',serif;font-weight:900;font-size:.62rem;display:flex;align-items:center;justify-content:center;border:1px solid rgba(232,184,109,'+(visited.has(c)?'.6':'.2')+');">'+({'1':'I','2':'II','3':'III','4':'IV','5':'V','6':'VI'})[c]+'</span>'
        +'<span style="font-family:\'Cormorant Garamond\',serif;font-style:italic;font-size:.9rem;color:'+(visited.has(c)?'#F0DFC0':'#D4C4A0')+';opacity:'+(visited.has(c)?'1':'.6')+';">'+CAP_NAMES[c]+'</span>'
      +'</div>'
    )).join('');
    body.innerHTML = '<div><b>'+visited.size+'</b> de 6 cadernos visitados</div>'+list;
  }

  function computeStreak(){
    // streak = dias seguidos que o outro perfil abriu o pote, terminando hoje ou ontem
    // pote-log tem docs por dia (ymd). Ordenamos e contamos consecutivos.
    if(!buf.pote.length){ document.getElementById('streakBox').innerHTML = ''; return; }
    const days = Array.from(new Set(buf.pote.map(x => x.ymd).filter(Boolean))).sort();
    // converte pra Date e conta consecutivos ENDING with today or yesterday
    const toDate = ymd => { const p = ymd.split('-').map(Number); return new Date(p[0], p[1]-1, p[2]); };
    const today = new Date(); today.setHours(0,0,0,0);
    const yesterday = new Date(today); yesterday.setDate(today.getDate()-1);
    let streak = 0;
    let cursor = new Date(today);
    // se não abriu hoje mas abriu ontem, começa a contar de ontem (streak "quente" que espera hoje)
    const daySet = new Set(days);
    const ymdOf = d => d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
    if(!daySet.has(ymdOf(today)) && daySet.has(ymdOf(yesterday))) cursor = new Date(yesterday);
    while(daySet.has(ymdOf(cursor))){ streak++; cursor.setDate(cursor.getDate()-1); }
    const box = document.getElementById('streakBox');
    if(streak >= 2){
      box.innerHTML = '<span class="tl-streak on">🔥 <b>'+streak+' dias</b> seguidos abrindo o pote ♡</span>';
    } else if(streak === 1){
      box.innerHTML = '<span class="tl-streak">✦ Abriu o pote hoje pela primeira vez desta sequência</span>';
    } else {
      box.innerHTML = '';
    }
  }

  // BILHETES DO POTE — histórico completo (todos os que vocês trocaram)
  let _allBilhetes = [];
  let _lidosPelaOther = new Set(); // ids que a OUTRA já leu (do pote-log dela)
  function _esc(s){ return String(s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function renderBilhetes(){
    const env = _allBilhetes.filter(b => b.by === who).sort((a,b)=> (b.ts||0)-(a.ts||0));
    const rec = _allBilhetes.filter(b => b.by === other).sort((a,b)=> (b.ts||0)-(a.ts||0));
    const cEnv = document.getElementById('btCountEnv');
    const cRec = document.getElementById('btCountRec');
    if(cEnv) cEnv.textContent = env.length;
    if(cRec) cRec.textContent = rec.length;
    const fmt = (arr, showLido) => arr.length
      ? arr.map(b => {
          const lido = _lidosPelaOther.has(b.id);
          return '<div class="bt-item">'
            +'<div class="bt-txt">'+_esc(b.texto)+'</div>'
            +'<div class="bt-meta"><span>'+relativo(b.ts||0)+'</span>'
              + (showLido ? '<span class="bt-lido'+(lido?' on':'')+'">'+(lido?'✓ ela leu':'aguardando abrir')+'</span>' : '')
            +'</div>'
          +'</div>';
        }).join('')
      : '<div class="bt-empty">nenhum ainda ♡</div>';
    const listEnv = document.getElementById('btListEnv');
    const listRec = document.getElementById('btListRec');
    if(listEnv) listEnv.innerHTML = fmt(env, true);
    if(listRec) listRec.innerHTML = fmt(rec, false);
  }
  document.querySelectorAll('.bt-tab').forEach(t => t.addEventListener('click', ()=>{
    document.querySelectorAll('.bt-tab').forEach(x => x.classList.toggle('on', x === t));
    const which = t.dataset.bt;
    document.getElementById('btListEnv').style.display = which === 'env' ? '' : 'none';
    document.getElementById('btListRec').style.display = which === 'rec' ? '' : 'none';
  }));
  _db.collection('pote-bilhetes').onSnapshot(snap => {
    _allBilhetes = [];
    snap.forEach(doc => {
      const d = doc.data() || {};
      if(!d.texto || !d.by) return;
      _allBilhetes.push({ id: doc.id, by: d.by, texto: String(d.texto), ts: d.ts || 0 });
    });
    renderBilhetes();
  }, ()=>{});

  // POTE — TODOS os docs dela (pra timeline, streak e marca "ela leu")
  _db.collection('pote-log').where('who','==', other).onSnapshot(snap => {
    buf.pote = [];
    _lidosPelaOther = new Set();
    let todayDoc = null;
    const tYmd = todayYmd();
    snap.forEach(doc => {
      const d = doc.data() || {};
      if(!d.ts) return;
      buf.pote.push({ ts:d.ts, dia:d.dia, ymd:d.ymd });
      if(d.bilheteId) _lidosPelaOther.add(d.bilheteId);
      if(d.ymd === tYmd) todayDoc = d;
    });
    renderBilhetes();
    // card do pote de hoje
    const body = document.getElementById('poteBody');
    if(todayDoc){
      body.className = 'state';
      body.innerHTML =
        '<div class="pote-hero">'
          +'<div class="pote-mini" aria-hidden="true"></div>'
          +'<div class="pote-info"><span class="dia-num">'+(todayDoc.dia||'?')+'</span><b>dia</b><span class="dia-lbl">bilhete de hoje · aberto '+relativo(todayDoc.ts||Date.now())+'</span></div>'
        +'</div>';
    } else {
      body.className = 'state empty';
      body.textContent = 'a Grazi ainda não abriu o pote hoje ♡';
    }
    rebuildTimeline(); computeStreak();
  }, ()=>{
    document.getElementById('poteBody').textContent = 'não foi possível ler o pote agora.';
  });

  // FIDELIDADE — todos os selos
  _db.collection('fidelidade').where('who','==', other).onSnapshot(snap => {
    buf.fid = [];
    const seen = new Set();
    snap.forEach(doc => {
      const d = doc.data();
      if(!d || !d.seloId) return;
      seen.add(String(d.seloId));
      const at = d.at ? Date.parse(d.at) : (d.ts || 0);
      buf.fid.push({ ts: at, seloId: d.seloId });
    });
    document.querySelectorAll('#fidMini .fid-dot').forEach(dot => {
      const id = dot.getAttribute('data-selo');
      if(seen.has(id)) dot.classList.add('on'); else dot.classList.remove('on');
    });
    document.getElementById('fidN').textContent = seen.size;
    document.getElementById('fidBar').style.width = (seen.size/12*100)+'%';
    rebuildTimeline();
  }, ()=>{});

  // SECRETO
  _db.collection('secreto-log').where('who','==', other).onSnapshot(snap => {
    buf.sec = [];
    let latest = 0;
    snap.forEach(doc => {
      const d = doc.data();
      if(!d || !d.ts) return;
      buf.sec.push({ ts:d.ts });
      if(d.ts > latest) latest = d.ts;
    });
    const body = document.getElementById('secretoBody');
    if(!buf.sec.length){
      body.className = 'state empty';
      body.textContent = 'ela ainda não abriu o caderno secreto ♡';
    } else {
      body.className = 'state';
      body.innerHTML =
        '<span class="secreto-badge">✦ visitado</span> '
        +'a Grazi abriu o Cap VI <b>'+relativo(latest)+'</b>'
        + (buf.sec.length > 1 ? ' — <em>'+buf.sec.length+' vezes ao todo</em>' : '');
    }
    rebuildTimeline();
  }, ()=>{});

  // VISITAS aos 6 cadernos
  _db.collection('visits').where('who','==', other).onSnapshot(snap => {
    buf.vis = [];
    snap.forEach(doc => {
      const d = doc.data();
      if(!d || !d.cap || !d.ts) return;
      buf.vis.push({ ts:d.ts, cap:String(d.cap) });
    });
    paintVisits();
    rebuildTimeline();
  }, ()=>{});
})();
</script>
</body>
</html>
